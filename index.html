<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Démo AR - Nendaz</title>
<script src="https://cdn.jsdelivr.net/npm/aframe@1.6.0/dist/aframe-master.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.8/aframe/build/aframe-ar.js"></script>
<style>
 html{background:#000}
 body{margin:0;padding:0;overflow:hidden;width:100%;height:100%;background:transparent;font-family:Arial}
 /* Caméra plein écran sous le canvas 3D */
 video, #arjsVideo{position:fixed!important;top:0!important;left:0!important;
   width:100vw!important;height:100vh!important;object-fit:cover!important;z-index:1!important}
 .a-canvas, canvas.a-canvas{position:fixed!important;top:0!important;left:0!important;
   width:100vw!important;height:100vh!important;z-index:2!important;background:transparent!important}
 .ov{position:fixed;top:8px;left:8px;right:8px;z-index:9999;color:#fff;
   background:rgba(0,0,0,.55);border-radius:10px;padding:8px;font-size:13px}
 .badge{background:#16a34a;color:#fff;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:bold}
 #log{position:fixed;left:6px;right:6px;bottom:6px;z-index:99999;background:rgba(0,0,0,.75);
   color:#0f0;font-size:11px;line-height:1.4;padding:8px;border-radius:8px;max-height:24%;overflow:auto;white-space:pre-wrap}
</style>
</head>
<body>
<div class="ov"><span class="badge">Démo AR Nendaz v150</span><br>Vise le marqueur HIRO — le bâtiment apparaît dessus.</div>
<div id="log">Démarrage…</div>

<a-scene embedded vr-mode-ui="enabled: false"
         renderer="alpha: true; antialias: true; precision: medium"
         arjs="sourceType: webcam; debugUIEnabled: false;">
  <a-assets timeout="20000">
    <a-asset-item id="buildingModel" src="model.glb"></a-asset-item>
  </a-assets>

  <a-marker id="mk" preset="hiro" smooth="true" smoothCount="10">
    <!-- petit repère rouge pour confirmer la détection (à retirer plus tard) -->
    <a-box position="0 0.1 0" scale="0.15 0.15 0.15" material="color: red;"></a-box>
    <!-- ton bâtiment -->
    <a-entity gltf-model="#buildingModel"
              position="0 0 0" rotation="-90 0 0" scale="0.05 0.05 0.05"></a-entity>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
  var L=document.getElementById('log');
  function log(m){ L.textContent += "\n" + m; }
  window.addEventListener('error', function(e){ log("ERR: " + (e.message||"(sans message)")); });
  window.addEventListener('arjs-video-loaded', function(){ log("Camera OK"); });
  window.addEventListener('load', function(){
    log("AFRAME="+(window.AFRAME?AFRAME.version:"ABSENT")+" r"+(AFRAME&&AFRAME.THREE?AFRAME.THREE.REVISION:"?"));
    var mk=document.getElementById('mk');
    mk.addEventListener('markerFound',function(){ log(">>> MARQUEUR DETECTE"); });
    mk.addEventListener('markerLost',function(){ log("(perdu)"); });
    var m=document.querySelector('[gltf-model]');
    m.addEventListener('model-loaded',function(){ log("Batiment charge OK"); });
    m.addEventListener('model-error',function(){ log("Batiment .glb ERREUR"); });
    document.querySelector('a-scene').addEventListener('loaded',function(){ log("Scene prete"); });
  });
</script>
</body>
</html>
