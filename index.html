<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Démo AR - Nendaz</title>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.8/aframe/build/aframe-ar.js"></script>
<style>
 html,body{margin:0;overflow:hidden;background:#000;font-family:Arial}
 #start{position:fixed;inset:0;z-index:100000;display:flex;flex-direction:column;
   align-items:center;justify-content:center;background:#0b1220;color:#fff;text-align:center;padding:24px}
 #start h1{font-size:22px;margin:0 0 10px}
 #start p{font-size:14px;opacity:.85;max-width:320px;line-height:1.4;margin:0 0 26px}
 #startBtn{background:#f97316;color:#fff;border:none;border-radius:14px;
   padding:18px 34px;font-size:18px;font-weight:bold;box-shadow:0 6px 20px rgba(249,115,22,.4)}
 #log{position:fixed;left:6px;right:6px;bottom:6px;z-index:99999;background:rgba(0,0,0,.85);
   color:#0f0;font-size:11px;line-height:1.4;padding:8px;border-radius:8px;
   max-height:34%;overflow:auto;white-space:pre-wrap;display:none}
 .overlay{position:fixed;top:8px;left:8px;right:8px;z-index:9999;color:#fff;
   background:rgba(0,0,0,.6);border-radius:10px;padding:8px;font-size:13px;display:none}
 .badge{background:#2563eb;color:#fff;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:bold}
</style>
</head>
<body>

<!-- Écran de démarrage : la caméra ne se lance qu'au tap (exigence iOS) -->
<div id="start">
  <h1>Démo AR — Nendaz</h1>
  <p>Appuie sur Démarrer, autorise la caméra, puis vise le marqueur HIRO imprimé.</p>
  <button id="startBtn">▶ Démarrer la caméra</button>
</div>

<div class="overlay" id="ov"><span class="badge">VERSION v80</span><br>Vise le marqueur HIRO.</div>
<div id="log">Démarrage…</div>

<!-- Conteneur vide : la scène AR sera injectée au clic -->
<div id="sceneHost"></div>

<script>
  var L=document.getElementById('log');
  function log(m){ L.textContent += "\n" + m; }
  window.addEventListener('error', function(e){ log("ERR: " + (e.message||"(script externe)")); });
  window.addEventListener('arjs-video-loaded', function(){ log("Camera OK"); });

  document.getElementById('startBtn').addEventListener('click', function(){
    // masque l'écran de démarrage, montre logs + overlay
    document.getElementById('start').style.display='none';
    document.getElementById('ov').style.display='block';
    L.style.display='block';

    log("AFRAME=" + (window.AFRAME ? AFRAME.version : "ABSENT")
        + " | THREE r" + (window.AFRAME && AFRAME.THREE ? AFRAME.THREE.REVISION : "?"));
    var arjsLoaded = !!(window.THREEx && window.THREEx.ArToolkitContext)
                  || !!(AFRAME.systems && AFRAME.systems.arjs)
                  || !!(AFRAME.components && AFRAME.components.arjs);
    log("AR.js=" + (arjsLoaded ? "OK" : "ABSENT"));

    // Injecte la scène MAINTENANT, dans le geste utilisateur -> caméra autorisée par iOS
    document.getElementById('sceneHost').innerHTML =
      '<a-scene embedded vr-mode-ui="enabled: false"' +
      ' renderer="precision: medium; antialias: true; alpha: true"' +
      ' arjs="sourceType: webcam; debugUIEnabled: false;">' +
      '  <a-assets timeout="20000">' +
      '    <a-asset-item id="buildingModel" src="model.glb"></a-asset-item>' +
      '  </a-assets>' +
      '  <a-marker preset="hiro" smooth="true" smoothCount="10">' +
      '    <a-box position="0 0.5 0" material="color: red;"></a-box>' +
      '    <a-entity gltf-model="#buildingModel" position="0 0 0" rotation="-90 0 0" scale="0.02 0.02 0.02"></a-entity>' +
      '  </a-marker>' +
      '  <a-entity camera></a-entity>' +
      '</a-scene>';

    var s = document.querySelector('a-scene');
    s.addEventListener('loaded', function(){ log("Scene prete"); });
    setTimeout(function(){
      var m = document.querySelector('[gltf-model]');
      if(m){
        m.addEventListener('model-loaded', function(){ log("Modele 3D charge ✓"); });
        m.addEventListener('model-error', function(){ log("Modele .glb erreur"); });
      }
    }, 500);
  });
</script>
</body>
</html>
