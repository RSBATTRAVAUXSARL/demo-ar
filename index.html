<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <title>Haute Nendaz AR - Plan 2D ancré HIRO A4</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:Arial,Helvetica,sans-serif;color:white;}
    .top{position:fixed;left:12px;right:72px;top:12px;z-index:50;background:rgba(10,16,28,.82);border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:12px 14px;backdrop-filter:blur(8px);box-shadow:0 8px 26px rgba(0,0,0,.35)}
    .badge{display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:5px 10px;background:#16a34a;font-weight:800;margin-bottom:8px}
    .dot{width:10px;height:10px;border-radius:50%;background:#86efac}
    .title{font-size:20px;font-weight:900;line-height:1.1}
    .sub{font-size:13px;color:#d7dee9;margin-top:4px;line-height:1.25}
    #gear{position:fixed;right:18px;top:24px;z-index:60;width:62px;height:62px;border-radius:50%;border:none;background:#2563eb;color:white;font-size:30px;box-shadow:0 10px 25px rgba(0,0,0,.35)}
    #panel{position:fixed;left:0;right:0;bottom:0;z-index:70;background:rgba(9,17,32,.94);border-radius:22px 22px 0 0;padding:16px 16px max(16px,env(safe-area-inset-bottom));display:none;max-height:68vh;overflow:auto;box-shadow:0 -8px 30px rgba(0,0,0,.4)}
    #panel.open{display:block}
    .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:10px 0}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
    button{font:inherit}
    .btn{border:none;border-radius:14px;padding:12px 10px;background:#7c3aed;color:white;font-weight:800;font-size:16px}
    .btn.orange{background:#f97316} .btn.green{background:#16a34a} .btn.blue{background:#0ea5e9} .btn.gray{background:#64748b}
    label{display:block;margin:12px 0 4px;font-weight:700;color:#e5e7eb}
    input[type=range]{width:100%}
    .val{color:#7dd3fc;font-weight:900;float:right}
    .hint{position:fixed;left:12px;right:12px;bottom:16px;z-index:45;text-align:center;background:rgba(0,0,0,.58);border-radius:14px;padding:10px 12px;font-size:14px;line-height:1.25;pointer-events:none}
    .legend{display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:12px;margin-top:8px;color:#cbd5e1}
    .sw{display:inline-block;width:28px;height:6px;border-radius:99px;margin-right:5px;vertical-align:middle}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
    .stat{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:7px}
    .stat b{font-size:15px}
    .stat span{display:block;font-size:11px;color:#cbd5e1;margin-top:2px}
  </style>
</head>
<body>
  <div class="top">
    <div class="badge"><span class="dot" id="statusDot"></span><span id="statusText">Vise le HIRO A4</span></div>
    <div class="title">Plan 2D coffrage AR — Haute Nendaz</div>
    <div class="sub">Ancré sur marqueur HIRO. Un doigt = tourner. Deux doigts = zoom.</div>
    <div class="stats">
      <div class="stat"><b id="statVoiles">—</b><span>voiles</span></div>
      <div class="stat"><b id="statMl">—</b><span>ml voiles</span></div>
      <div class="stat"><b id="statTr">—</b><span>trémies</span></div>
    </div>
    <div class="legend"><span><i class="sw" style="background:#111827"></i>voiles</span><span><i class="sw" style="background:#7dd3fc"></i>radier</span><span><i class="sw" style="background:#ef4444"></i>trémies</span></div>
  </div>
  <button id="gear">⚙️</button>
  <div id="panel">
    <h2 style="margin:2px 0 10px">Réglages AR</h2>
    <div class="row">
      <button class="btn" id="presetPlan">Plan A4</button>
      <button class="btn blue" id="presetRelief">Relief</button>
      <button class="btn orange" id="presetReal">Réel 1:1</button>
    </div>
    <div class="row2">
      <button class="btn green" id="lockBtn">Verrouiller</button>
      <button class="btn gray" id="resetBtn">Reset</button>
    </div>
    <label>Échelle maquette <span class="val" id="scaleVal"></span></label>
    <input id="scaleRange" type="range" min="0.005" max="0.08" step="0.001" />
    <label>Hauteur des voiles <span class="val" id="heightVal"></span></label>
    <input id="heightRange" type="range" min="0.02" max="0.35" step="0.005" />
    <label>Épaisseur visuelle <span class="val" id="thickVal"></span></label>
    <input id="thickRange" type="range" min="0.008" max="0.08" step="0.002" />
    <label>Rotation plan <span class="val" id="rotVal"></span></label>
    <input id="rotRange" type="range" min="-180" max="180" step="1" />
    <label>Taille marqueur HIRO imprimé <span class="val" id="markerVal"></span></label>
    <input id="markerRange" type="range" min="0.08" max="0.30" step="0.01" />
    <div class="row2">
      <button class="btn green" id="saveBtn">✓ Sauvegarder</button>
      <button class="btn orange" id="toggleRadier">Masquer radier</button>
    </div>
  </div>
  <div class="hint">Pose le HIRO bien à plat. Pour une démo stable : mode Plan A4, téléphone à 40–70 cm, lumière mate.</div>

  <a-scene embedded vr-mode-ui="enabled:false" renderer="antialias:true; alpha:true; precision:mediump; logarithmicDepthBuffer:true" arjs="sourceType:webcam; trackingMethod:best; debugUIEnabled:false; detectionMode:mono; maxDetectionRate:30;">
    <a-marker id="hiro" preset="hiro" size="0.16" smooth="true" smoothCount="10" smoothTolerance="0.015" smoothThreshold="4">
      <a-entity id="planRoot" plan-builder></a-entity>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

const SETTINGS_KEY = 'nendaz_ar_plan2d_hiro_a4_v1';
let state = {
  modelScale: 0.025,
  wallHeight: 0.075,
  minThickness: 0.020,
  rotationY: 0,
  markerSize: 0.16,
  showRadier: true,
  locked: false,
  userScale: 1,
  userRotY: 0
};

function itemList(type){ return RAW_DATA.items.filter(i => i.mtype === type); }
function mPoint(p){ return {x:p[0]*RAW_DATA.scale, z:-p[1]*RAW_DATA.scale}; }
function wallItems(){ return itemList('VOILE'); }
function radierItem(){ return itemList('RADIER')[0]; }
function tremies(){ return itemList('DEDUCT_DALLE'); }
function fmt(n,d=2){ return Number(n||0).toFixed(d); }
function centerFromRadier(){
  const r = radierItem();
  const pts = r ? r.pts_pdf.map(mPoint) : wallItems().flatMap(w => w.pts_pdf.map(mPoint));
  let minX=Infinity,maxX=-Infinity,minZ=Infinity,maxZ=-Infinity;
  pts.forEach(p=>{ minX=Math.min(minX,p.x); maxX=Math.max(maxX,p.x); minZ=Math.min(minZ,p.z); maxZ=Math.max(maxZ,p.z); });
  return {cx:(minX+maxX)/2, cz:(minZ+maxZ)/2, minX,maxX,minZ,maxZ, width:maxX-minX, depth:maxZ-minZ};
}
const geomInfo = centerFromRadier();

function makeMat(color, opacity=1){
  const mat = new THREE.MeshStandardMaterial({color, transparent: opacity < 1, opacity, roughness:.72, metalness:0});
  mat.side = THREE.DoubleSide;
  return mat;
}
const mats = {
  radier: makeMat(0x7dd3fc, .38),
  radierEdge: makeMat(0x0f172a, 1),
  wall: makeMat(0x1f2937, 1),
  wallTop: makeMat(0x6b7280, 1),
  tremie: makeMat(0xef4444, .9),
  marker: makeMat(0x22c55e, 1)
};

AFRAME.registerComponent('plan-builder', {
  init() {
    this.root = this.el.object3D;
    this.group = new THREE.Group();
    this.root.add(this.group);
    loadSettings();
    this.build();
    window.rebuildPlan = () => this.build();
  },
  build() {
    while(this.group.children.length) this.group.remove(this.group.children[0]);
    this.group.rotation.y = THREE.MathUtils.degToRad(state.rotationY + state.userRotY);
    this.group.scale.setScalar(state.userScale);
    if(state.showRadier) this.addRadier();
    this.addTremies();
    this.addWalls();
    this.addNorthMarker();
  },
  conv(p){
    const mp = mPoint(p);
    return new THREE.Vector2((mp.x - geomInfo.cx) * state.modelScale, (mp.z - geomInfo.cz) * state.modelScale);
  },
  addRadier(){
    const r = radierItem(); if(!r) return;
    const pts = r.pts_pdf.map(p => this.conv(p));
    const shape = new THREE.Shape(pts);
    const geom = new THREE.ShapeGeometry(shape);
    geom.rotateX(-Math.PI/2);
    const mesh = new THREE.Mesh(geom, mats.radier);
    mesh.position.y = 0.002;
    this.group.add(mesh);
    // outline as dark low walls around polygon
    for(let i=0;i<pts.length-1;i++) this.addSegmentBox(pts[i], pts[i+1], 0.018, 0.012, mats.radierEdge, 0.014);
  },
  addTremies(){
    tremies().forEach(t => {
      const pts = t.pts_pdf.map(p => this.conv(p));
      const shape = new THREE.Shape(pts);
      const geom = new THREE.ShapeGeometry(shape);
      geom.rotateX(-Math.PI/2);
      const mesh = new THREE.Mesh(geom, mats.tremie);
      mesh.position.y = 0.018;
      this.group.add(mesh);
      for(let i=0;i<pts.length;i++) this.addSegmentBox(pts[i], pts[(i+1)%pts.length], 0.014, 0.018, mats.tremie, 0.030);
    });
  },
  addWalls(){
    wallItems().forEach(w => {
      const a = this.conv(w.pts_pdf[0]), b = this.conv(w.pts_pdf[1]);
      const realThick = ((w.thickness_cm||18)/100) * state.modelScale;
      const visualThick = Math.max(realThick, state.minThickness);
      this.addSegmentBox(a,b,visualThick,state.wallHeight,mats.wall,state.wallHeight/2+0.018);
      this.addSegmentBox(a,b,visualThick*0.92,0.006,mats.wallTop,state.wallHeight+0.024);
    });
  },
  addSegmentBox(a,b,thick,height,mat,ypos){
    const dx=b.x-a.x, dz=b.y-a.y;
    const len=Math.sqrt(dx*dx+dz*dz); if(len<=0.0001) return;
    const geom = new THREE.BoxGeometry(len, height, thick);
    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.set((a.x+b.x)/2, ypos, (a.y+b.y)/2);
    mesh.rotation.y = -Math.atan2(dz, dx);
    this.group.add(mesh);
  },
  addNorthMarker(){
    const g = new THREE.BoxGeometry(0.12,0.05,0.05);
    const m = new THREE.Mesh(g,mats.marker);
    m.position.set(0,0.055, (geomInfo.minZ-geomInfo.cz)*state.modelScale - 0.16);
    this.group.add(m);
  }
});

function refreshUI(){
  document.getElementById('scaleRange').value = state.modelScale;
  document.getElementById('heightRange').value = state.wallHeight;
  document.getElementById('thickRange').value = state.minThickness;
  document.getElementById('rotRange').value = state.rotationY;
  document.getElementById('markerRange').value = state.markerSize;
  document.getElementById('scaleVal').textContent = state.modelScale.toFixed(3);
  document.getElementById('heightVal').textContent = state.wallHeight.toFixed(3);
  document.getElementById('thickVal').textContent = state.minThickness.toFixed(3);
  document.getElementById('rotVal').textContent = state.rotationY + '°';
  document.getElementById('markerVal').textContent = Math.round(state.markerSize*100) + ' cm';
  document.getElementById('hiro').setAttribute('size', state.markerSize);
  document.getElementById('lockBtn').textContent = state.locked ? 'Déverrouiller' : 'Verrouiller';
  document.getElementById('toggleRadier').textContent = state.showRadier ? 'Masquer radier' : 'Afficher radier';
}
function saveSettings(){ localStorage.setItem(SETTINGS_KEY, JSON.stringify(state)); }
function loadSettings(){ try{ Object.assign(state, JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}')); }catch(e){} refreshUI(); }
function rebuild(){ refreshUI(); if(window.rebuildPlan) window.rebuildPlan(); }

document.getElementById('gear').onclick=()=>document.getElementById('panel').classList.toggle('open');
document.getElementById('presetPlan').onclick=()=>{ Object.assign(state,{modelScale:0.025,wallHeight:0.075,minThickness:0.020,rotationY:0,userScale:1,userRotY:0}); rebuild(); };
document.getElementById('presetRelief').onclick=()=>{ Object.assign(state,{modelScale:0.025,wallHeight:0.18,minThickness:0.022}); rebuild(); };
document.getElementById('presetReal').onclick=()=>{ Object.assign(state,{modelScale:1.0,wallHeight:2.80,minThickness:0.18}); alert('Mode réel : le bâtiment fait sa vraie taille. Pose le HIRO au sol et recule-toi.'); rebuild(); };
document.getElementById('resetBtn').onclick=()=>{ localStorage.removeItem(SETTINGS_KEY); location.reload(); };
document.getElementById('saveBtn').onclick=()=>{ saveSettings(); alert('Réglages sauvegardés sur ce téléphone.'); };
document.getElementById('toggleRadier').onclick=()=>{ state.showRadier=!state.showRadier; rebuild(); };
document.getElementById('lockBtn').onclick=()=>{ state.locked=!state.locked; refreshUI(); alert(state.locked ? 'Position verrouillée visuellement. Garde le HIRO dans le champ pour un tracking fiable.' : 'Déverrouillé.'); };
['scale','height','thick','rot','marker'].forEach(name=>{
  const el=document.getElementById(name+'Range');
  el.addEventListener('input',()=>{
    if(name==='scale') state.modelScale=parseFloat(el.value);
    if(name==='height') state.wallHeight=parseFloat(el.value);
    if(name==='thick') state.minThickness=parseFloat(el.value);
    if(name==='rot') state.rotationY=parseInt(el.value,10);
    if(name==='marker') state.markerSize=parseFloat(el.value);
    rebuild();
  });
});

const marker = document.getElementById('hiro');
marker.addEventListener('markerFound',()=>{ document.getElementById('statusText').textContent='HIRO détecté'; document.getElementById('statusDot').style.background='#22c55e'; });
marker.addEventListener('markerLost',()=>{ document.getElementById('statusText').textContent='Vise le HIRO A4'; document.getElementById('statusDot').style.background='#f97316'; });

// Gestes : 1 doigt rotation, 2 doigts zoom
let touchMode=null, lastX=0, lastDist=0;
document.addEventListener('touchstart',e=>{
  if(e.target.closest('#panel')||e.target.closest('#gear')) return;
  if(e.touches.length===1){ touchMode='rot'; lastX=e.touches[0].clientX; }
  if(e.touches.length===2){ touchMode='zoom'; const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY; lastDist=Math.hypot(dx,dy); }
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(e.target.closest('#panel')||e.target.closest('#gear')) return;
  if(touchMode==='rot' && e.touches.length===1){ const x=e.touches[0].clientX; state.userRotY += (x-lastX)*0.35; lastX=x; rebuild(); }
  if(touchMode==='zoom' && e.touches.length===2){ const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY; const d=Math.hypot(dx,dy); if(lastDist>0){ state.userScale=Math.max(.35,Math.min(4,state.userScale*(d/lastDist))); rebuild(); } lastDist=d; }
},{passive:true});
document.addEventListener('touchend',()=>{ touchMode=null; });

// stats
const walls=wallItems();
const ml=walls.reduce((a,w)=>a+(w.value||0),0);
document.getElementById('statVoiles').textContent=walls.length;
document.getElementById('statMl').textContent=fmt(ml,1)+' ml';
document.getElementById('statTr').textContent=tremies().length;
refreshUI();
</script>
</body>
</html>
