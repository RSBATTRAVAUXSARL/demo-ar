const state=Object.assign({scale:2.35,height:0.06,rot:0},JSON.parse(localStorage.getItem('nendaz_plan_v3')||'{}'));
let rootEl,markerEl,group,buildingMade=false;
function localPt(pt,b,fit){const x=pt[0]*PLAN_DATA.scale;const z=-(pt[1]*PLAN_DATA.scale);return{x:(x-b.cx)*fit,z:(z-b.cz)*fit};}
function computeBounds(){let xs=[],zs=[];PLAN_DATA.items.forEach(it=>(it.pts_pdf||[]).forEach(p=>{xs.push(p[0]*PLAN_DATA.scale);zs.push(-(p[1]*PLAN_DATA.scale));}));let minX=Math.min(...xs),maxX=Math.max(...xs),minZ=Math.min(...zs),maxZ=Math.max(...zs);return{cx:(minX+maxX)/2,cz:(minZ+maxZ)/2,w:maxX-minX,d:maxZ-minZ};}
function mat(color,opacity=1){return new THREE.MeshBasicMaterial({color,transparent:opacity<1,opacity,side:THREE.DoubleSide,depthWrite:true});}
function shapeMesh(points,y,color,opacity){const shape=new THREE.Shape();points.forEach((p,i)=>{if(i===0)shape.moveTo(p.x,p.z);else shape.lineTo(p.x,p.z);});const geo=new THREE.ShapeGeometry(shape);geo.rotateX(-Math.PI/2);const mesh=new THREE.Mesh(geo,mat(color,opacity));mesh.position.y=y;return mesh;}
function addLine(p1,p2,y,color,width){const dx=p2.x-p1.x,dz=p2.z-p1.z,len=Math.hypot(dx,dz);const geo=new THREE.BoxGeometry(len,0.012,width);const mesh=new THREE.Mesh(geo,mat(color,1));mesh.position.set((p1.x+p2.x)/2,y,(p1.z+p2.z)/2);mesh.rotation.y=-Math.atan2(dz,dx);group.add(mesh);}
function addWall(p1,p2,thickCm){const dx=p2.x-p1.x,dz=p2.z-p1.z,len=Math.hypot(dx,dz);const h=state.height,t=Math.max(0.022,(thickCm/100)*0.06);const geo=new THREE.BoxGeometry(len,h,t);const mesh=new THREE.Mesh(geo,mat(0x08111f,1));mesh.position.set((p1.x+p2.x)/2,h/2+0.035,(p1.z+p2.z)/2);mesh.rotation.y=-Math.atan2(dz,dx);group.add(mesh);}
function build(){rootEl=document.getElementById('root'); if(!rootEl||!rootEl.object3D)return; if(group)rootEl.object3D.remove(group); group=new THREE.Group(); rootEl.object3D.add(group); const b=computeBounds(); const fit=1.8/Math.max(b.w,b.d); const radier=PLAN_DATA.items.find(i=>i.mtype==='RADIER'); if(radier){const pts=radier.pts_pdf.map(p=>localPt(p,b,fit));group.add(shapeMesh(pts,0.002,0x64d8ff,.62));for(let i=0;i<pts.length-1;i++)addLine(pts[i],pts[i+1],0.025,0x020617,0.018);} PLAN_DATA.items.filter(i=>i.mtype==='DEDUCT_DALLE').forEach(it=>{const pts=it.pts_pdf.map(p=>localPt(p,b,fit));group.add(shapeMesh(pts,0.045,0xff3333,.95));}); PLAN_DATA.items.filter(i=>i.mtype==='VOILE').forEach(it=>{addWall(localPt(it.pts_pdf[0],b,fit),localPt(it.pts_pdf[1],b,fit),it.thickness_cm||18);}); addLine({x:-.18,z:0},{x:.18,z:0},0.12,0x00ff66,0.035);addLine({x:0,z:-.18},{x:0,z:.18},0.121,0xffcc00,0.035); buildingMade=true; apply();}
function apply(){if(!rootEl)return;rootEl.object3D.scale.setScalar(state.scale);rootEl.object3D.rotation.y=THREE.MathUtils.degToRad(state.rot);scale.value=state.scale;height.value=state.height;rot.value=state.rot;scaleVal.textContent=state.scale.toFixed(2);heightVal.textContent=state.height.toFixed(3);rotVal.textContent=state.rot+'°';}
window.addEventListener('load',()=>{markerEl=document.getElementById('marker');setTimeout(build,1200);setTimeout(()=>{if(!buildingMade)build();},2500);markerEl.addEventListener('markerFound',()=>{statusText.textContent='HIRO détecté';});markerEl.addEventListener('markerLost',()=>{statusText.textContent='Vise le HIRO A4';});});
gear.onclick=()=>panel.classList.toggle('open');scale.oninput=()=>{state.scale=parseFloat(scale.value);apply();};rot.oninput=()=>{state.rot=parseInt(rot.value);apply();};height.oninput=()=>{state.height=parseFloat(height.value);build();};big.onclick=()=>{state.scale=2.6;state.height=.075;build();};fill.onclick=()=>{state.scale=3.5;state.height=.065;build();};save.onclick=()=>{localStorage.setItem('nendaz_plan_v3',JSON.stringify(state));panel.classList.remove('open');};reset.onclick=()=>{localStorage.removeItem('nendaz_plan_v3');location.reload();};
let lastX=null,pinch=null;document.addEventListener('touchstart',e=>{if(e.target.closest('#panel,#gear'))return;if(e.touches.length===1)lastX=e.touches[0].clientX;if(e.touches.length===2)pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);},{passive:true});document.addEventListener('touchmove',e=>{if(e.target.closest('#panel,#gear'))return;if(e.touches.length===1&&lastX!==null){const x=e.touches[0].clientX;state.rot+=(x-lastX)*0.35;lastX=x;apply();}if(e.touches.length===2&&pinch){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);state.scale=Math.min(4.5,Math.max(.5,state.scale*(d/pinch)));pinch=d;apply();}},{passive:true});
