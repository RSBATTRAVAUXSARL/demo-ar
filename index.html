<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Test AR v140</title>
<script src="https://cdn.jsdelivr.net/npm/aframe@1.6.0/dist/aframe-master.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.8/aframe/build/aframe-ar.js"></script>
<style>
 html,body{margin:0;padding:0;overflow:hidden;background:#000}
 #log{position:fixed;left:6px;right:6px;bottom:6px;z-index:99999;background:rgba(0,0,0,.8);
   color:#0f0;font:11px Arial;line-height:1.4;padding:8px;border-radius:8px;max-height:28%;overflow:auto;white-space:pre-wrap}
 .ov{position:fixed;top:8px;left:8px;right:8px;z-index:9999;color:#fff;
   background:rgba(220,38,38,.85);border-radius:10px;padding:8px;font:13px Arial}
</style>
</head>
<body>
<div class="ov">v140 — scène EN DUR. Vise le Hiro, le cube rouge doit apparaître.</div>
<div id="log">Démarrage…</div>

<!-- Scène écrite directement dans le HTML, PAS injectée par JS -->
<a-scene embedded vr-mode-ui="enabled: false"
         renderer="alpha: true; antialias: true"
         arjs="sourceType: webcam; debugUIEnabled: false;">
  <a-marker id="mk" preset="hiro">
    <a-box position="0 0.5 0" material="color: red;"></a-box>
    <a-box position="0 1.5 0" scale="0.5 0.5 0.5" material="color: #00ff66; wireframe: true;"></a-box>
  </a-marker>
  <a-entity camera></a-entity>
</a-scene>

<script>
  var L=document.getElementById('log');
  function log(m){ L.textContent += "\n" + m; }
  window.addEventListener('error', function(e){ log("ERR: " + (e.message||"(sans message)")); });
  window.addEventListener('arjs-video-loaded', function(){ log("Camera OK"); });
  window.addEventListener('load', function(){
    log("AFRAME="+(window.AFRAME?AFRAME.version:"ABSENT")+" r"+(AFRAME&&AFRAME.THREE?AFRAME.THREE.REVISION:"?"));
    var mk=document.getElementById('mk');
    mk.addEventListener('markerFound',function(){ log(">>> MARQUEUR DETECTE — cube ?"); });
    mk.addEventListener('markerLost',function(){ log("(perdu)"); });
    var s=document.querySelector('a-scene');
    s.addEventListener('loaded',function(){ log("Scene prete"); });
  });
</script>
</body>
</html>
