<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>IMER Live · RS BAT · Mur 2m</title>
<style>
  html,body{margin:0;height:100%;background:#000;font-family:-apple-system,Segoe UI,Arial,sans-serif;overflow:hidden}
  #video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover}
  #overlay{position:fixed;inset:0;width:100%;height:100%}
  .hud{position:fixed;top:10px;left:10px;right:10px;z-index:10;display:flex;align-items:center;gap:10px;
       background:rgba(255,255,255,.92);border-left:5px solid #d4001a;border-radius:12px;padding:10px 12px}
  .hud b{color:#d4001a}
  .badge{margin-left:auto;padding:4px 10px;border-radius:99px;font-size:12px;font-weight:800;background:#fee2e2;color:#991b1b;white-space:nowrap}
  .badge.ok{background:#d1fae5;color:#065f46}
  #startBtn{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:20;padding:18px 30px;
            border:0;border-radius:14px;background:#d4001a;color:#fff;font-size:18px;font-weight:800;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  .foot{position:fixed;bottom:10px;left:10px;right:10px;z-index:10;background:rgba(255,255,255,.88);
        border-radius:10px;padding:8px 11px;font-size:12px;color:#1f2328}
</style>
</head>
<body>
<video id="video" playsinline muted autoplay></video>
<canvas id="overlay"></canvas>
<div class="hud"><b>IMER Live</b> <span>Mur 2,00 × 2,00 m</span><span class="badge" id="badge">Recherche…</span></div>
<button id="startBtn">Démarrer la caméra</button>
<div class="foot" id="foot">Vise la cible IMER A3 imprimée. Les 4 coins doivent être visibles et nets.</div>

<script>
(() => {
'use strict';
/* ================= SPEC IMER (mm) — doit correspondre à imer-spec.json ================= */
const SPEC = {
  corners: {TL:[40,40], TR:[380,40], BR:[380,257], BL:[40,257]},
  bullseye: {outer:24, mid:14, core:6.5},
  circle: {center:[210,148.5], radius:90},
  asym_disc: {center:[60,214], r:8},
  page: [420,297]
};
/* Mur affiché : 2 m de long, 2 m de haut, 18 cm d'épaisseur, centré sur la cible */
const WALL = {len:2000, height:2000, th:180};

const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const octx = overlay.getContext('2d');
const badge = document.getElementById('badge');
const foot = document.getElementById('foot');
const work = document.createElement('canvas');
const wctx = work.getContext('2d', {willReadFrequently:true});
const WW = 480;              // largeur de travail (détection)
let smooth = null;           // coins lissés
let lostCount = 99;
let upSign = 0;              // sens "haut" du mur (déterminé à la 1re pose)
let fps = 0, frames = 0, lastFpsT = performance.now();

document.getElementById('startBtn').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720}}, audio: false
    });
    video.srcObject = stream;
    await video.play();
    document.getElementById('startBtn').style.display = 'none';
    requestAnimationFrame(loop);
  } catch (e) {
    foot.textContent = 'Caméra refusée : ' + e.message + ' — vérifie les autorisations Safari/Chrome et le HTTPS.';
  }
});

/* ================= Détection des coins (balayage de ratios, style QR finder) =================
   Cible imbriquée 24/14/6.5 mm -> le long d'une ligne passant par le centre :
   noir 5 · blanc 3.75 · noir 6.5 · blanc 3.75 · noir 5  (total 24) */
const RATIOS = [5, 3.75, 6.5, 3.75, 5];
const RTOT = RATIOS.reduce((a,b)=>a+b,0);

function checkRatios(runs) {
  const tot = runs.reduce((a,b)=>a+b,0);
  if (tot < 8) return false;
  for (let i = 0; i < 5; i++) {
    const exp = RATIOS[i]/RTOT*tot;
    if (Math.abs(runs[i]-exp) > Math.max(1.6, exp*0.5)) return false;
  }
  return true;
}

function crossCheck(bin, W, H, cx, cy) {
  // vérifie le motif verticalement à la colonne cx, renvoie le centre vertical raffiné ou null
  const want = [1,0,1,0,1]; // noir blanc noir blanc noir
  const runs = [0,0,0,0,0];

  let y = cy;
  while (y >= 0 && bin[y*W+cx] === 1) { runs[2]++; y--; }
  for (let k = 1; k >= 0; k--) {
    while (y >= 0 && bin[y*W+cx] === want[k]) { runs[k]++; y--; }
  }
  const yTop = y;

  y = cy + 1;
  while (y < H && bin[y*W+cx] === 1) { runs[2]++; y++; }
  for (let k = 3; k <= 4; k++) {
    while (y < H && bin[y*W+cx] === want[k]) { runs[k]++; y++; }
  }

  if (!checkRatios(runs)) return null;
  const tot = runs.reduce((a,b)=>a+b,0);
  return yTop + tot/2;
}

function findBullseyes(bin, W, H) {
  const cands = [];
  for (let y = 1; y < H-1; y += 2) {
    let runs = [], vals = [], x = 0;
    let cur = bin[y*W], len = 1;
    for (x = 1; x < W; x++) {
      const v = bin[y*W+x];
      if (v === cur) len++;
      else {
        runs.push(len); vals.push(cur);
        cur = v; len = 1;
        const n = runs.length;
        if (n >= 5) {
          const v5 = vals.slice(n-5);
          if (v5[0]===1 && v5[1]===0 && v5[2]===1 && v5[3]===0 && v5[4]===1) {
            const w5 = runs.slice(n-5);
            if (checkRatios(w5)) {
              const tot = w5.reduce((a,b)=>a+b,0);
              const cxx = Math.round(x - len - (w5[4] + w5[3] + w5[2]/2));
              const cyR = crossCheck(bin, W, H, Math.max(0, Math.min(W-1, cxx)), y);
              if (cyR !== null) cands.push({x:cxx, y:cyR, size:tot});
            }
          }
        }
      }
    }
  }
  // clustering
  const clusters = [];
  cands.forEach(c => {
    const cl = clusters.find(k => Math.abs(k.x-c.x) < c.size*0.7 && Math.abs(k.y-c.y) < c.size*0.7);
    if (cl) { cl.x = (cl.x*cl.n + c.x)/(cl.n+1); cl.y = (cl.y*cl.n + c.y)/(cl.n+1); cl.size = (cl.size*cl.n + c.size)/(cl.n+1); cl.n++; }
    else clusters.push({x:c.x, y:c.y, size:c.size, n:1});
  });
  return clusters.filter(c => c.n >= 2).sort((a,b) => b.n - a.n).slice(0, 8);
}

/* ================= Homographie 4 points (DLT + Gauss) ================= */
function homography(src, dst) {
  const A = [];
  for (let i = 0; i < 4; i++) {
    const [x,y] = src[i], [u,v] = dst[i];
    A.push([x,y,1,0,0,0,-u*x,-u*y,u]);
    A.push([0,0,0,x,y,1,-v*x,-v*y,v]);
  }
  // résoudre A[.,0..7] h = A[.,8]
  const M = A.map(r => r.slice(0,8).concat([r[8]]));
  for (let c = 0; c < 8; c++) {
    let p = c;
    for (let r = c+1; r < 8; r++) if (Math.abs(M[r][c]) > Math.abs(M[p][c])) p = r;
    if (Math.abs(M[p][c]) < 1e-9) return null;
    [M[c], M[p]] = [M[p], M[c]];
    for (let r = 0; r < 8; r++) {
      if (r === c) continue;
      const f = M[r][c]/M[c][c];
      for (let k = c; k <= 8; k++) M[r][k] -= f*M[c][k];
    }
  }
  const h = [];
  for (let i = 0; i < 8; i++) h.push(M[i][8]/M[i][i]);
  h.push(1);
  return h; // h[0..8], mappe src->dst
}
function applyH(h, x, y) {
  const w = h[6]*x + h[7]*y + h[8];
  return [(h[0]*x + h[1]*y + h[2])/w, (h[3]*x + h[4]*y + h[5])/w];
}

/* ================= Pose depuis l'homographie (K estimé) ================= */
function poseFromH(h, W, H) {
  const f = 0.95*Math.max(W,H), cx = W/2, cy = H/2;
  // M = K^-1 * H
  const m = [
    (h[0]-cx*h[6])/f, (h[1]-cx*h[7])/f, (h[2]-cx*h[8])/f,
    (h[3]-cy*h[6])/f, (h[4]-cy*h[7])/f, (h[5]-cy*h[8])/f,
    h[6], h[7], h[8]
  ];
  const n1 = Math.hypot(m[0], m[3], m[6]);
  const n2 = Math.hypot(m[1], m[4], m[7]);
  const s = 2/(n1+n2);
  let r1 = [m[0]*s, m[3]*s, m[6]*s];
  let r2 = [m[1]*s, m[4]*s, m[7]*s];
  let t  = [m[2]*s, m[5]*s, m[8]*s];
  if (t[2] < 0) { r1 = r1.map(v=>-v); r2 = r2.map(v=>-v); t = t.map(v=>-v); }
  let r3 = [r1[1]*r2[2]-r1[2]*r2[1], r1[2]*r2[0]-r1[0]*r2[2], r1[0]*r2[1]-r1[1]*r2[0]];
  // ré-orthogonaliser r2
  r2 = [r3[1]*r1[2]-r3[2]*r1[1], r3[2]*r1[0]-r3[0]*r1[2], r3[0]*r1[1]-r3[1]*r1[0]];
  const norm = v => { const n = Math.hypot(v[0],v[1],v[2])||1; return [v[0]/n, v[1]/n, v[2]/n]; };
  r1 = norm(r1); r2 = norm(r2); r3 = norm(r3);
  return {R:[r1,r2,r3], t, f, cx, cy};
}
function projectPt(pose, X, Y, Z) {
  const {R, t, f, cx, cy} = pose;
  const x = R[0][0]*X + R[1][0]*Y + R[2][0]*Z + t[0];
  const y = R[0][1]*X + R[1][1]*Y + R[2][1]*Z + t[1];
  const z = R[0][2]*X + R[1][2]*Y + R[2][2]*Z + t[2];
  if (z <= 1) return null;
  return {x: cx + f*x/z, y: cy + f*y/z, z};
}

/* ================= Boucle principale ================= */
function loop() {
  requestAnimationFrame(loop);
  if (video.readyState < 2) return;
  frames++;
  const now = performance.now();
  if (now - lastFpsT > 1000) { fps = frames; frames = 0; lastFpsT = now; }

  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw) return;
  const WH = Math.round(WW*vh/vw);
  work.width = WW; work.height = WH;
  wctx.drawImage(video, 0, 0, WW, WH);
  const img = wctx.getImageData(0, 0, WW, WH);
  const d = img.data;
  const N = WW*WH;
  const gray = new Uint8Array(N);
  let sum = 0;
  for (let i = 0; i < N; i++) {
    const g = (d[i*4]*3 + d[i*4+1]*6 + d[i*4+2]) / 10;
    gray[i] = g; sum += g;
  }
  const thr = otsuThreshold(gray);              // plus robuste que moyenne*0.72 sur moquette / chantier
  const bin = new Uint8Array(N);
  for (let i = 0; i < N; i++) bin[i] = gray[i] < thr ? 1 : 0;

  const clusters = findBullseyes(bin, WW, WH)
    .filter(c => c.size >= 7 && c.size <= 70 && c.n >= 3);  // filtre anti-bruit

  overlay.width = window.innerWidth * (window.devicePixelRatio||1);
  overlay.height = window.innerHeight * (window.devicePixelRatio||1);
  overlay.style.width = window.innerWidth + 'px';
  overlay.style.height = window.innerHeight + 'px';
  octx.setTransform(1,0,0,1,0,0);
  octx.clearRect(0,0,overlay.width,overlay.height);
  // mapping travail -> écran (video object-fit:cover)
  const sw = overlay.width, sh = overlay.height;
  const scale = Math.max(sw/WW, sh/WH);
  const ox = (sw - WW*scale)/2, oy = (sh - WH*scale)/2;
  const toScr = p => ({x: ox + p.x*scale, y: oy + p.y*scale});

  if (clusters.length < 4) { onLost('Recherche… (' + clusters.length + '/4 coins)'); return; }

  // Sélection robuste : on teste toutes les combinaisons et on rejette les faux positifs.
  const objC = [SPEC.corners.TL, SPEC.corners.TR, SPEC.corners.BR, SPEC.corners.BL];
  const pts = clusters.slice(0, 8);
  let bestH = null, bestScore = -1e9;
  const combos = kCombos(pts, 4);

  combos.forEach(c => {
    const hull = orderHull(c);
    if (hull.length !== 4) return;
    const area = polyArea(hull);
    if (area < 500) return;

    for (let rev = 0; rev < 2; rev++) {
      const seq = rev ? hull.slice().reverse() : hull;
      for (let rot = 0; rot < 4; rot++) {
        const ordered = [0,1,2,3].map(i => seq[(rot+i)%4]);
        const h = homography(objC, ordered.map(p => [p.x, p.y]));
        if (!h) continue;

        const q = validateImerPose(h, ordered, gray, thr, WW, WH);
        if (!q.ok) continue;
        if (q.score > bestScore) { bestScore = q.score; bestH = {h, ordered, q}; }
      }
    }
  });

  if (!bestH) { onLost('Faux coins rejetés · cible non validée'); return; }

  // lissage temporel des coins
  const cur = bestH.ordered.map(p => [p.x, p.y]);
  if (!smooth) smooth = cur;
  else smooth = smooth.map((p,i) => [p[0]*0.55 + cur[i][0]*0.45, p[1]*0.55 + cur[i][1]*0.45]);
  const h = homography(objC, smooth);
  if (!h) { onLost('Homographie instable'); return; }
  lostCount = 0;

  const pose = poseFromH(h, WW, WH);
  const dist = Math.hypot(pose.t[0], pose.t[1], pose.t[2]) / 1000;
  badge.textContent = 'IMER ✓ · ' + dist.toFixed(2) + ' m · ' + fps + ' fps';
  badge.classList.add('ok');
  foot.textContent = 'Mur 2,00 × 2,00 m · ép. 18 cm — cible validée, score ' + Math.round(bestH.q.score) + '.';

  // sens "haut" : celui qui monte à l'écran (déterminé une fois)
  if (!upSign) {
    const c0 = projectPt(pose, SPEC.circle.center[0], SPEC.circle.center[1], 0);
    const cU = projectPt(pose, SPEC.circle.center[0], SPEC.circle.center[1], -200);
    upSign = (c0 && cU && cU.y < c0.y) ? -1 : 1;
  }

  drawWall(pose, toScr);

  // marqueurs : coins + centre virtuel reconstruit (le vide qui calcule)
  octx.lineWidth = 3;
  smooth.forEach(p => {
    const s = toScr({x:p[0], y:p[1]});
    octx.strokeStyle = '#d4001a';
    octx.beginPath(); octx.arc(s.x, s.y, 12, 0, Math.PI*2); octx.stroke();
  });
  const [vcx, vcy] = applyH(h, SPEC.circle.center[0], SPEC.circle.center[1]);
  const vc = toScr({x:vcx, y:vcy});
  octx.strokeStyle = '#0f766e';
  octx.beginPath(); octx.moveTo(vc.x-16, vc.y); octx.lineTo(vc.x+16, vc.y);
  octx.moveTo(vc.x, vc.y-16); octx.lineTo(vc.x, vc.y+16); octx.stroke();
}

function onLost(msg) {
  lostCount++;
  if (lostCount > 4) { smooth = null; badge.textContent = msg; badge.classList.remove('ok'); }
}

function drawWall(pose, toScr) {
  const cx = SPEC.circle.center[0], cyv = SPEC.circle.center[1];
  const L = WALL.len/2, T = WALL.th/2;
  // le mur court le long de l'axe X de la cible, centré
  const base = [
    [cx-L, cyv-T], [cx+L, cyv-T], [cx+L, cyv+T], [cx-L, cyv+T]
  ];
  const bot = base.map(p => projectPt(pose, p[0], p[1], 0));
  const topZ = upSign * WALL.height;   // correction : le mur monte dans le bon sens
  const top2 = base.map(p => projectPt(pose, p[0], p[1], topZ));
  if (bot.some(p=>!p) || top2.some(p=>!p)) return;
  const faces = [];
  for (let i = 0; i < 4; i++) {
    const j = (i+1)%4;
    faces.push({pts:[bot[i], bot[j], top2[j], top2[i]],
                z:(bot[i].z + bot[j].z + top2[i].z + top2[j].z)/4,
                fill:'rgba(192,132,87,' + (i%2 ? '0.80' : '0.62') + ')'});
  }
  faces.push({pts:top2, z:top2.reduce((a,p)=>a+p.z,0)/4, fill:'rgba(214,158,110,0.85)'});
  faces.sort((a,b) => b.z - a.z);
  faces.forEach(f => {
    octx.beginPath();
    f.pts.forEach((p,i) => { const s = toScr(p); i ? octx.lineTo(s.x, s.y) : octx.moveTo(s.x, s.y); });
    octx.closePath();
    octx.fillStyle = f.fill;
    octx.strokeStyle = '#39424d';
    octx.lineWidth = 2;
    octx.fill(); octx.stroke();
  });
  // étiquette
  const mid = projectPt(pose, cx, cyv, topZ);
  if (mid) {
    const s = toScr(mid);
    octx.font = 'bold 16px -apple-system, Arial';
    octx.fillStyle = '#fff';
    octx.strokeStyle = 'rgba(0,0,0,.6)';
    octx.lineWidth = 4;
    octx.textAlign = 'center';
    octx.strokeText('Mur 200 × 200 · ép. 18', s.x, s.y - 12);
    octx.fillText('Mur 200 × 200 · ép. 18', s.x, s.y - 12);
  }
}


/* ================= validation anti-faux positifs ================= */
function otsuThreshold(gray) {
  const hist = new Uint32Array(256);
  for (let i = 0; i < gray.length; i++) hist[gray[i]]++;
  const total = gray.length;
  let sum = 0;
  for (let t = 0; t < 256; t++) sum += t * hist[t];
  let sumB = 0, wB = 0, best = 0, bestVar = -1;
  for (let t = 0; t < 256; t++) {
    wB += hist[t];
    if (!wB) continue;
    const wF = total - wB;
    if (!wF) break;
    sumB += t * hist[t];
    const mB = sumB / wB;
    const mF = (sum - sumB) / wF;
    const v = wB * wF * (mB - mF) * (mB - mF);
    if (v > bestVar) { bestVar = v; best = t; }
  }
  // sécurité : évite un seuil trop bas quand la scène est majoritairement sombre/grise
  return Math.max(45, Math.min(210, best));
}

function sampleLum(gray, W, H, x, y, r=2) {
  const xi = Math.round(x), yi = Math.round(y);
  if (xi < r || yi < r || xi >= W-r || yi >= H-r) return null;
  let s = 0, n = 0;
  for (let yy = -r; yy <= r; yy++) {
    for (let xx = -r; xx <= r; xx++) {
      s += gray[(yi+yy)*W + xi+xx]; n++;
    }
  }
  return s/n;
}

function validateImerPose(h, ordered, gray, thr, W, H) {
  const proj = (p) => {
    const q = applyH(h, p[0], p[1]);
    if (!Number.isFinite(q[0]) || !Number.isFinite(q[1])) return null;
    return {x:q[0], y:q[1]};
  };
  const lum = (p, r=2) => {
    const q = proj(p);
    if (!q) return null;
    return sampleLum(gray, W, H, q.x, q.y, r);
  };

  // 1) La feuille A3 projetée doit exister à l'écran et avoir une vraie surface.
  //    C'est le verrou principal contre les faux positifs dans la moquette.
  const pagePoly = [[0,0], [SPEC.page[0],0], SPEC.page, [0,SPEC.page[1]]].map(proj);
  if (pagePoly.some(p => !p)) return {ok:false, score:-999, reason:'page hors champ'};
  const pageArea = polyArea(pagePoly);
  if (pageArea < 1800) return {ok:false, score:-999, reason:'feuille trop petite'};

  const d = (a,b) => Math.hypot(a.x-b.x, a.y-b.y);
  const pwTop = d(pagePoly[0], pagePoly[1]);
  const pwBot = d(pagePoly[3], pagePoly[2]);
  const phLeft = d(pagePoly[0], pagePoly[3]);
  const phRight = d(pagePoly[1], pagePoly[2]);
  if (Math.min(pwTop,pwBot,phLeft,phRight) < 18) return {ok:false, score:-999, reason:'côtés trop courts'};
  if (Math.max(pwTop,pwBot) / Math.min(pwTop,pwBot) > 2.15) return {ok:false, score:-999, reason:'haut/bas incohérents'};
  if (Math.max(phLeft,phRight) / Math.min(phLeft,phRight) > 2.15) return {ok:false, score:-999, reason:'gauche/droite incohérents'};

  const center = proj(SPEC.circle.center);
  if (!center || !pointInPoly(center, pagePoly)) return {ok:false, score:-999, reason:'centre hors feuille'};

  // 2) La cible doit être imprimée sur une grande zone blanche.
  //    On échantillonne des points sûrs de la feuille, loin des traits noirs.
  const whitePts = [
    [210,18], [210,279], [20,148], [400,148], [210,148.5],
    [145,148], [275,148], [145,90], [275,90], [145,207], [275,207],
    [85,80], [335,80], [85,225], [335,225], [210,60], [210,237]
  ];
  const whiteVals = whitePts.map(p => lum(p, 3)).filter(v => v !== null);
  if (whiteVals.length < 12) return {ok:false, score:-999, reason:'feuille incomplète'};
  const avgWhite = whiteVals.reduce((a,b)=>a+b,0) / whiteVals.length;
  const whiteLimit = Math.max(158, thr + 34);
  const whiteOk = whiteVals.filter(v => v > whiteLimit).length;
  if (avgWhite < whiteLimit || whiteOk < Math.ceil(whiteVals.length * 0.68)) {
    return {ok:false, score:-999, reason:'pas de feuille blanche'};
  }

  // 3) Validation stricte des 4 coins : noir / blanc / noir / blanc.
  //    Sans cette signature, aucun IMER ✓, même si 4 points forment un quadrilatère.
  const cornerPts = [SPEC.corners.TL, SPEC.corners.TR, SPEC.corners.BR, SPEC.corners.BL];
  let cornerScore = 0;
  let cornerOk = 0;
  for (const c of cornerPts) {
    const q0 = lum(c, 2); // coeur noir
    const midOffsets = [[5,0],[-5,0],[0,5],[0,-5]];     // anneau blanc
    const outerOffsets = [[10,0],[-10,0],[0,10],[0,-10]]; // anneau noir
    const bgOffsets = [[16,0],[-16,0],[0,16],[0,-16]];  // papier blanc hors cible
    const mids = midOffsets.map(o => lum([c[0]+o[0], c[1]+o[1]], 1)).filter(v=>v!==null);
    const outers = outerOffsets.map(o => lum([c[0]+o[0], c[1]+o[1]], 1)).filter(v=>v!==null);
    const bgs = bgOffsets.map(o => lum([c[0]+o[0], c[1]+o[1]], 1)).filter(v=>v!==null);
    if (q0 === null || mids.length < 3 || outers.length < 3 || bgs.length < 3) continue;
    const avgMid = mids.reduce((a,b)=>a+b,0)/mids.length;
    const avgOuter = outers.reduce((a,b)=>a+b,0)/outers.length;
    const avgBg = bgs.reduce((a,b)=>a+b,0)/bgs.length;

    const darkCore = avgWhite - q0;
    const whiteMid = avgMid - q0;
    const darkOuter = avgBg - avgOuter;
    const bgWhite = avgBg > whiteLimit - 8;

    if (darkCore > 45 && whiteMid > 35 && darkOuter > 28 && bgWhite) {
      cornerOk++;
      cornerScore += darkCore + whiteMid + darkOuter;
    }
  }
  if (cornerOk < 4) return {ok:false, score:-999, reason:'coins non confirmés'};

  // 4) Disque asymétrique : noir à gauche, pas de disque au miroir droit.
  const discLum = lum(SPEC.asym_disc.center, 2);
  const mirrorLum = lum([SPEC.page[0]-SPEC.asym_disc.center[0], SPEC.asym_disc.center[1]], 2);
  if (discLum === null || mirrorLum === null) return {ok:false, score:-999, reason:'asym hors champ'};
  const asym = mirrorLum - discLum;
  if (avgWhite - discLum < 38 || asym < 22) {
    return {ok:false, score:-999, reason:'asymétrie non confirmée'};
  }

  // 5) Éléments internes : colonnes, barres et arcs doivent être sombres par contraste avec le papier.
  const blackChecks = [
    [60,130], [60,170], [360,130], [360,170],
    [100,52], [320,52], [100,245], [320,245],
    [122,120], [298,177]
  ];
  let blackOk = 0;
  let blackScore = 0;
  for (const p of blackChecks) {
    const v = lum(p, 2);
    if (v !== null && avgWhite - v > 34) { blackOk++; blackScore += avgWhite - v; }
  }
  if (blackOk < 6) return {ok:false, score:-999, reason:'motifs internes non confirmés'};

  // 6) Garde-fou distance : une cible A3 vue dans l'image ne peut pas donner 10 cm.
  //    On ne calcule pas ici la distance caméra, mais on évite les homographies dégénérées.
  const markerArea = polyArea(ordered);
  if (markerArea < pageArea * 0.28 || markerArea > pageArea * 0.88) {
    return {ok:false, score:-999, reason:'échelle marqueurs incohérente'};
  }

  const score = Math.round((avgWhite - whiteLimit) * 2 + cornerScore + blackScore + asym + pageArea / 80);
  return {ok:true, score, reason:'ok'};
}
function pointInPoly(p, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i].x, yi = poly[i].y;
    const xj = poly[j].x, yj = poly[j].y;
    const intersect = ((yi > p.y) !== (yj > p.y)) &&
      (p.x < (xj - xi) * (p.y - yi) / ((yj - yi) || 1e-9) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

/* ================= utilitaires géométrie ================= */
function kCombos(arr, k) {
  const out = [];
  const rec = (start, cur) => {
    if (cur.length === k) { out.push(cur.slice()); return; }
    for (let i = start; i < arr.length; i++) { cur.push(arr[i]); rec(i+1, cur); cur.pop(); }
  };
  rec(0, []);
  return out;
}
function orderHull(pts) {
  const c = {x: pts.reduce((a,p)=>a+p.x,0)/pts.length, y: pts.reduce((a,p)=>a+p.y,0)/pts.length};
  const sorted = pts.slice().sort((a,b) => Math.atan2(a.y-c.y, a.x-c.x) - Math.atan2(b.y-c.y, b.x-c.x));
  // convexité stricte
  for (let i = 0; i < 4; i++) {
    const a = sorted[i], b = sorted[(i+1)%4], d = sorted[(i+2)%4];
    const cr = (b.x-a.x)*(d.y-b.y) - (b.y-a.y)*(d.x-b.x);
    if (Math.abs(cr) < 1e-6) return [];
  }
  return sorted;
}
function polyArea(pts) {
  let a = 0;
  for (let i = 0; i < pts.length; i++) {
    const j = (i+1)%pts.length;
    a += pts[i].x*pts[j].y - pts[j].x*pts[i].y;
  }
  return Math.abs(a)/2;
}
