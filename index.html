<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Plan coffrage AR - lisible</title>
<script src="https://cdn.jsdelivr.net/npm/aframe@1.6.0/dist/aframe-master.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.8/aframe/build/aframe-ar.js"></script>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;touch-action:none}
video,#arjsVideo{position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;object-fit:cover!important;z-index:1!important}
.a-canvas,canvas.a-canvas{position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;z-index:2!important;background:transparent!important}
#hud{position:fixed;left:12px;top:calc(12px + env(safe-area-inset-top));z-index:10;max-width:78vw;background:rgba(10,16,30,.78);color:#fff;border:1px solid rgba(255,255,255,.16);border-radius:16px;padding:10px 13px;box-shadow:0 8px 28px rgba(0,0,0,.35);backdrop-filter:blur(8px)}
#status{display:inline-flex;gap:7px;align-items:center;background:#16a34a;padding:6px 10px;border-radius:999px;font-weight:800;font-size:14px;margin-bottom:6px}
#status.lost{background:#f97316}.dot{width:10px;height:10px;background:#34d399;border-radius:50%}.lost .dot{background:#ff2d2d}
#hud b{display:block;font-size:16px;margin-bottom:2px}.small{font-size:13px;color:#e5e7eb;line-height:1.25}
#gear{position:fixed;right:14px;top:calc(18px + env(safe-area-inset-top));z-index:20;width:56px;height:56px;border:0;border-radius:50%;background:#2563eb;color:white;font-size:26px;font-weight:900;box-shadow:0 8px 28px rgba(0,0,0,.45)}
#help{position:fixed;left:12px;right:12px;bottom:calc(18px + env(safe-area-inset-bottom));z-index:10;color:#fff;text-align:center;background:rgba(0,0,0,.62);border-radius:14px;padding:10px 12px;font-size:14px}
#panel{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(10,18,35,.96);color:#fff;border-radius:20px 20px 0 0;padding:16px 16px calc(16px + env(safe-area-inset-bottom));box-shadow:0 -10px 30px rgba(0,0,0,.55);transform:translateY(105%);transition:.22s;max-height:74vh;overflow:auto}
#panel.open{transform:translateY(0)}h2{font-size:19px;margin:0 0 12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border:0;border-radius:14px;padding:13px 12px;color:white;font-size:16px;font-weight:900;background:#7c3aed}.green{background:#16a34a}.blue{background:#0ea5e9}.orange{background:#f97316}.gray{background:#64748b}
.row{margin:12px 0}.row label{display:flex;justify-content:space-between;font-size:15px;margin-bottom:5px}.row b{color:#7dd3fc}input[type=range]{width:100%;height:34px}.ghost{opacity:.28}
</style>
</head>
<body>
<div id="hud"><div id="status" class="lost"><span class="dot"></span><span id="stxt">Vise HIRO</span></div><b>Plan coffrage AR</b><div class="small">Le modèle est volontairement bas : lisible comme un plan.</div></div>
<button id="gear">⚙</button>
<div id="help">Un doigt : tourner. Deux doigts : zoom. Vise le marqueur A4 à 40–70 cm.</div>

<a-scene embedded vr-mode-ui="enabled:false"
  renderer="alpha:true;antialias:true;precision:medium;sortObjects:true"
  arjs="sourceType:webcam;trackingMethod:best;debugUIEnabled:false;detectionMode:mono;">
  <a-assets timeout="20000">
    <a-asset-item id="planModel" src="model_plan_lisible_v2.glb"></a-asset-item>
  </a-assets>
  <a-marker id="hiro" preset="hiro" smooth="true" smoothCount="5" smoothTolerance="0.015" smoothThreshold="3">
    <a-entity id="pivot" rotation="0 0 0" scale="1 1 1" position="0 0.012 0">
      <a-entity id="plan" gltf-model="#planModel" rotation="0 0 0" position="0 0 0" scale="1 1 1"></a-entity>
    </a-entity>
  </a-marker>
  <a-entity camera></a-entity>
</a-scene>

<div id="panel">
<h2>Réglages rapides</h2>
<div class="grid">
  <button class="btn" id="bFit">Plan lisible</button>
  <button class="btn" id="bRelief">Relief +</button>
  <button class="btn orange" id="bTurn">Tourner 90°</button>
  <button class="btn gray" id="bReset">Reset</button>
</div>
<div class="row"><label>Taille <b id="vScale">1.00</b></label><input id="scale" type="range" min="0.35" max="2.2" step="0.01" value="1"></div>
<div class="row"><label>Relief / hauteur <b id="vY">1.00</b></label><input id="sy" type="range" min="0.25" max="3" step="0.05" value="1"></div>
<div class="row"><label>Rotation <b id="vRot">0°</b></label><input id="rot" type="range" min="-180" max="180" step="1" value="0"></div>
<div class="row"><label>Décalage X <b id="vX">0.00</b></label><input id="px" type="range" min="-0.8" max="0.8" step="0.01" value="0"></div>
<div class="row"><label>Décalage Z <b id="vZ">0.00</b></label><input id="pz" type="range" min="-0.8" max="0.8" step="0.01" value="0"></div>
<div class="grid"><button class="btn green" id="bSave">✓ Sauvegarder</button><button class="btn blue" id="bCopy">Copier réglages</button></div>
</div>

<script>
const pivot=document.getElementById('pivot'), plan=document.getElementById('plan'), panel=document.getElementById('panel');
const statusEl=document.getElementById('status'), stxt=document.getElementById('stxt');
const inputs=['scale','sy','rot','px','pz'];
let S={scale:1,sy:1,rot:0,px:0,pz:0};
function read(){inputs.forEach(id=>S[id]=parseFloat(document.getElementById(id).value));}
function write(){inputs.forEach(id=>document.getElementById(id).value=S[id]);}
function apply(){
 read();
 pivot.setAttribute('rotation','0 '+S.rot+' 0');
 pivot.setAttribute('position',S.px+' 0.012 '+S.pz);
 pivot.setAttribute('scale',S.scale+' '+S.scale+' '+S.scale);
 plan.setAttribute('scale','1 '+S.sy+' 1');
 vScale.textContent=S.scale.toFixed(2);vY.textContent=S.sy.toFixed(2);vRot.textContent=Math.round(S.rot)+'°';vX.textContent=S.px.toFixed(2);vZ.textContent=S.pz.toFixed(2);
}
function load(){try{let d=JSON.parse(localStorage.getItem('planARv2')); if(d){Object.assign(S,d);write();}}catch(e){} apply();}
function save(){read();localStorage.setItem('planARv2',JSON.stringify(S));}
inputs.forEach(id=>document.getElementById(id).addEventListener('input',apply));
gear.onclick=()=>panel.classList.toggle('open');
bFit.onclick=()=>{S={scale:1.05,sy:1,rot:S.rot||0,px:0,pz:0};write();apply();}
bRelief.onclick=()=>{S.sy=Math.min(3,S.sy+0.4);write();apply();}
bTurn.onclick=()=>{S.rot=(S.rot+90); if(S.rot>180)S.rot-=360; write();apply();}
bReset.onclick=()=>{S={scale:1,sy:1,rot:0,px:0,pz:0};write();apply();localStorage.removeItem('planARv2');}
bSave.onclick=()=>{save();panel.classList.remove('open');}
bCopy.onclick=()=>{read();let txt=JSON.stringify(S);navigator.clipboard&&navigator.clipboard.writeText(txt);}
hiro.addEventListener('markerFound',()=>{statusEl.classList.remove('lost');stxt.textContent='HIRO détecté';});
hiro.addEventListener('markerLost',()=>{statusEl.classList.add('lost');stxt.textContent='Vise HIRO';});

// gestes : un doigt rotation, deux doigts zoom
let mode='',x0=0,rot0=0,d0=0,scale0=1;
function dist(t){let dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.hypot(dx,dy)}
document.addEventListener('touchstart',e=>{
 if(panel.classList.contains('open')) return;
 if(e.touches.length===1){mode='rot';x0=e.touches[0].clientX;rot0=S.rot;}
 if(e.touches.length===2){mode='zoom';d0=dist(e.touches);scale0=S.scale;}
},{passive:false});
document.addEventListener('touchmove',e=>{
 if(panel.classList.contains('open')) return;
 e.preventDefault();
 if(mode==='rot'&&e.touches.length===1){S.rot=rot0+(e.touches[0].clientX-x0)*0.45; if(S.rot>180)S.rot-=360;if(S.rot<-180)S.rot+=360;write();apply();}
 if(mode==='zoom'&&e.touches.length===2){S.scale=Math.max(.35,Math.min(2.2,scale0*(dist(e.touches)/d0)));write();apply();}
},{passive:false});
document.addEventListener('touchend',()=>{mode='';},{passive:false});
window.addEventListener('load',load);
</script>
</body>
</html>
