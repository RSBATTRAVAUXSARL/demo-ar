<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Démo AR - Nendaz exploitable</title>
<script src="https://cdn.jsdelivr.net/npm/aframe@1.6.0/dist/aframe-master.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.8/aframe/build/aframe-ar.js"></script>
<style>
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif;touch-action:none;}
  video,#arjsVideo{position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;object-fit:cover!important;z-index:1!important;}
  .a-canvas,canvas.a-canvas{position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;z-index:2!important;background:transparent!important;}
  #hud{position:fixed;left:12px;top:calc(12px + env(safe-area-inset-top));z-index:20;color:#fff;background:rgba(15,23,42,.84);border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:12px;max-width:76vw;backdrop-filter:blur(8px)}
  #badge{display:inline-flex;gap:8px;align-items:center;background:#f97316;border-radius:999px;padding:5px 10px;font-weight:800;font-size:14px;margin-bottom:8px}
  #dot{width:10px;height:10px;background:#ef4444;border-radius:50%} #dot.on{background:#22c55e}
  #hud h1{margin:0 0 8px;font-size:18px;line-height:1.1} #hud .grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}.card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:8px}.n{font-size:17px;font-weight:900}.l{font-size:12px;color:#cbd5e1;margin-top:2px}
  #gear{position:fixed;right:14px;top:calc(18px + env(safe-area-inset-top));z-index:50;width:58px;height:58px;border:0;border-radius:50%;background:#2563eb;color:#fff;font-size:26px;font-weight:900;box-shadow:0 8px 25px rgba(0,0,0,.35)}
  #panel{position:fixed;left:0;right:0;bottom:0;z-index:45;background:rgba(15,23,42,.94);color:white;border-top-left-radius:26px;border-top-right-radius:26px;padding:18px 18px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -10px 35px rgba(0,0,0,.48);transform:translateY(104%);transition:.25s;max-height:72vh;overflow:auto;backdrop-filter:blur(10px)}
  #panel.open{transform:translateY(0)} #panel h2{margin:0 0 14px;font-size:22px}.btnRow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin:8px 0 16px}.btnRow button,.bigBtns button{border:0;border-radius:14px;color:#fff;font-size:16px;font-weight:900;padding:13px 10px;background:#7c3aed}.bigBtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.bigBtns button{background:#16a34a}.bigBtns .blue{background:#0ea5e9}.bigBtns .orange{background:#f97316}.bigBtns .gray{background:#64748b}
  .row{margin:12px 0}.row label{display:flex;justify-content:space-between;font-size:16px;margin-bottom:6px}.row b{color:#7dd3fc}input[type=range]{width:100%;accent-color:#0ea5e9}.triple{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}.hint{position:fixed;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom));z-index:19;color:#fff;text-align:center;background:rgba(0,0,0,.45);border-radius:14px;padding:8px;font-size:13px}.hide{display:none!important}
</style>
</head>
<body>
<div id="hud"><div id="badge"><span id="dot"></span><span id="state">Vise HIRO</span></div><h1>Dalles, trémies et voiles depuis le JSON</h1><div class="grid"><div class="card"><div class="n">81.70 ml</div><div class="l">Voiles</div></div><div class="card"><div class="n">457.51 m²</div><div class="l">Coffrage</div></div><div class="card"><div class="n">41.18 m³</div><div class="l">Volume murs</div></div><div class="card"><div class="n">212.86 m²</div><div class="l">Dalle brute</div></div><div class="card"><div class="n">17.41 m²</div><div class="l">Trémies total</div></div><div class="card"><div class="n">3</div><div class="l">Ouvertures</div></div></div></div>
<button id="gear">⚙︎</button>
<div class="hint" id="touchHint">Un doigt : tourner le plan. Deux doigts : zoom. Ouvre ⚙︎ pour sauvegarder.</div>

<a-scene embedded vr-mode-ui="enabled:false" renderer="alpha:true; antialias:true; precision:mediump; logarithmicDepthBuffer:true" arjs="sourceType:webcam; debugUIEnabled:false; trackingMethod:best; detectionMode:mono;">
  <a-assets timeout="30000"><a-asset-item id="buildingModel" src="model.glb"></a-asset-item></a-assets>
  <a-marker id="marker" preset="hiro" emitevents="true" smooth="true" smoothCount="18" smoothTolerance="0.008" smoothThreshold="3">
    <a-entity id="tableAnchor" position="0 0 0" rotation="0 0 0">
      <a-plane id="base" position="0 0.003 0" rotation="-90 0 0" width="1.15" height="1.15" material="color:#38bdf8; opacity:0.16; transparent:true; side:double"></a-plane>
      <a-box id="ref" position="0 .055 0" scale=".055 .11 .055" material="color:#ef4444"></a-box>
      <a-entity id="orient" rotation="0 0 0">
        <a-entity id="model" gltf-model="#buildingModel" position="0 0 0" rotation="0 0 0" scale="1 1 1"></a-entity>
      </a-entity>
    </a-entity>
  </a-marker>
  <a-entity camera></a-entity>
</a-scene>

<div id="panel">
  <h2>Réglages exploitables</h2>
  <div class="btnRow"><button id="p1">À plat 1</button><button id="p2">À plat 2</button><button id="p3">À plat 3</button></div>
  <div class="row"><label>Taille générale <b id="vScale">0.75</b></label><input id="scale" type="range" min="0.15" max="2.5" step="0.01" value="0.75"></div>
  <div class="triple"><div class="row"><label>X largeur <b id="vX">1.00</b></label><input id="sx" type="range" min="0.2" max="2" step="0.01" value="1"></div><div class="row"><label>Y hauteur <b id="vY">0.18</b></label><input id="sy" type="range" min="0.03" max="1.5" step="0.01" value="0.18"></div><div class="row"><label>Z profondeur <b id="vZ">1.00</b></label><input id="sz" type="range" min="0.2" max="2" step="0.01" value="1"></div></div>
  <div class="triple"><div class="row"><label>Rot X <b id="vRX">0°</b></label><input id="rx" type="range" min="-180" max="180" step="5" value="0"></div><div class="row"><label>Rot Y <b id="vRY">0°</b></label><input id="ry" type="range" min="-180" max="180" step="5" value="0"></div><div class="row"><label>Rot Z <b id="vRZ">0°</b></label><input id="rz" type="range" min="-180" max="180" step="5" value="0"></div></div>
  <div class="triple"><div class="row"><label>Pos X <b id="vPX">0.00</b></label><input id="px" type="range" min="-1" max="1" step="0.01" value="0"></div><div class="row"><label>Hauteur <b id="vPY">0.00</b></label><input id="py" type="range" min="-0.5" max="0.8" step="0.01" value="0"></div><div class="row"><label>Pos Z <b id="vPZ">0.00</b></label><input id="pz" type="range" min="-1" max="1" step="0.01" value="0"></div></div>
  <div class="bigBtns"><button id="save">✓ Sauvegarder</button><button id="copy" class="blue">⧉ Copier réglages</button><button id="toggleRef" class="orange">Masquer repère</button><button id="reset" class="gray">↺ Reset</button></div>
</div>
<script>
(function(){
  const $=id=>document.getElementById(id); const ids=['scale','sx','sy','sz','rx','ry','rz','px','py','pz'];
  let norm=1, yawTouch=0, refVisible=true, lastDist=null, startScale=null, dragX=null;
  const def={scale:.75,sx:1,sy:.18,sz:1,rx:0,ry:0,rz:0,px:0,py:0,pz:0};
  function num(id){return parseFloat($(id).value)} function set(id,v){$(id).value=v}
  function apply(){
    const sc=num('scale')*norm; const sx=num('sx'), sy=num('sy'), sz=num('sz');
    $('model').setAttribute('scale',`${sc*sx} ${sc*sy} ${sc*sz}`);
    $('model').setAttribute('rotation',`${num('rx')} ${num('ry')+yawTouch} ${num('rz')}`);
    $('model').setAttribute('position',`${num('px')} ${num('py')} ${num('pz')}`);
    $('vScale').textContent=num('scale').toFixed(2); $('vX').textContent=sx.toFixed(2); $('vY').textContent=sy.toFixed(2); $('vZ').textContent=sz.toFixed(2);
    $('vRX').textContent=num('rx')+'°'; $('vRY').textContent=Math.round(num('ry')+yawTouch)+'°'; $('vRZ').textContent=num('rz')+'°'; $('vPX').textContent=num('px').toFixed(2); $('vPY').textContent=num('py').toFixed(2); $('vPZ').textContent=num('pz').toFixed(2);
  }
  function save(){let d={yawTouch:yawTouch}; ids.forEach(id=>d[id]=num(id)); localStorage.setItem('arTableSettings',JSON.stringify(d)); toast('Sauvegardé ✓')}
  function load(){try{let d=JSON.parse(localStorage.getItem('arTableSettings')||'null'); if(d){ids.forEach(id=>{if(d[id]!=null)set(id,d[id])}); yawTouch=d.yawTouch||0}}catch(e){}}
  function toast(m){$('touchHint').textContent=m; $('touchHint').classList.remove('hide'); clearTimeout(window.__to); window.__to=setTimeout(()=>$('touchHint').textContent='Un doigt : tourner le plan. Deux doigts : zoom. Ouvre ⚙︎ pour sauvegarder.',1800)}
  ids.forEach(id=>$(id).addEventListener('input',apply));
  $('gear').onclick=()=>$('panel').classList.toggle('open');
  $('save').onclick=save;
  $('reset').onclick=()=>{ids.forEach(id=>set(id,def[id])); yawTouch=0; localStorage.removeItem('arTableSettings'); apply(); toast('Reset')};
  $('copy').onclick=()=>{const t=`rotation=${num('rx')} ${num('ry')+yawTouch} ${num('rz')} scale=${num('scale')} x=${num('sx')} y=${num('sy')} z=${num('sz')} pos=${num('px')} ${num('py')} ${num('pz')}`; navigator.clipboard&&navigator.clipboard.writeText(t); toast('Réglages copiés')};
  $('toggleRef').onclick=function(){refVisible=!refVisible; $('ref').setAttribute('visible',refVisible); this.textContent=refVisible?'Masquer repère':'Afficher repère'};
  function preset(rx,ry,rz,sy=.18){set('rx',rx); set('ry',ry); set('rz',rz); set('sy',sy); yawTouch=0; apply(); toast('Preset appliqué')}
  $('p1').onclick=()=>preset(0,0,0,.18); $('p2').onclick=()=>preset(90,0,0,.18); $('p3').onclick=()=>preset(0,90,0,.18);
  $('marker').addEventListener('markerFound',()=>{$('dot').classList.add('on'); $('state').textContent='HIRO détecté'});
  $('marker').addEventListener('markerLost',()=>{$('dot').classList.remove('on'); $('state').textContent='Vise HIRO'});
  $('model').addEventListener('model-loaded',()=>{
    setTimeout(()=>{try{ const obj=$('model').object3D; const box=new THREE.Box3().setFromObject(obj); const size=new THREE.Vector3(); box.getSize(size); const center=new THREE.Vector3(); box.getCenter(center); const max=Math.max(size.x,size.y,size.z); norm=max>0?0.95/max:1; obj.position.x-=center.x; obj.position.y-=box.min.y; obj.position.z-=center.z; apply(); toast('Modèle chargé et recentré'); }catch(e){console.warn(e); apply();}},200);
  });
  document.body.addEventListener('touchstart',e=>{ if(e.target.closest('#panel')||e.target.id==='gear')return; if(e.touches.length===1){dragX=e.touches[0].clientX;} if(e.touches.length===2){lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); startScale=num('scale');}}, {passive:false});
  document.body.addEventListener('touchmove',e=>{ if(e.target.closest('#panel'))return; e.preventDefault(); if(e.touches.length===1 && dragX!=null){const dx=e.touches[0].clientX-dragX; yawTouch+=dx*.35; dragX=e.touches[0].clientX; apply();} if(e.touches.length===2 && lastDist){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); const ratio=d/lastDist; set('scale',Math.max(.15,Math.min(2.5,startScale*ratio))); apply();}}, {passive:false});
  document.body.addEventListener('touchend',()=>{dragX=null; if(event && event.touches && event.touches.length<2){lastDist=null; startScale=null}}, {passive:false});
  load(); apply();
})();
</script>
</body>
</html>
